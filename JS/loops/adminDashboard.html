<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #products{
            display: flex;
            flex-wrap : wrap;
            gap: 20px;
            justify-content: center;
        }
        .card{
            width: 30%;
            height: 500px;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
        }
        .card img{
            width: 100%;
            height: 350px;
            object-fit: contain;
            display: block;
        }
        .card button{
            display: block;
            width: 50%;
            background-color: green;
            color: white;
            border: none;
            align-self: center;
        }

        #customers, #customers tr,th,td{
            border: 1px solid black;
        }
        #customers tr,th,td{
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="products"></div>

    <table id="customers">
        <tr>
            <th>Customer ID</th>
            <th>Customer Name</th>
            <th>Customer Email</th>
        </tr>
    </table>

    <table id="orders">
        <tr>
            <th>Order ID</th>
            <th>Customer Name</th>
            <th>Product Name</th>
            <th>Quantity</th>
            <th>Total Price</th>
            <th>Order Status</th>
        </tr>
    </table>

    <script src="adminDashboard.js"></script>
</body>
</html>
