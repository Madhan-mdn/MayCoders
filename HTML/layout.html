<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .container{
            display: flex;
            /* flex-direction: column; */
            width: 100%;
            /* height: 600px; */
            /* align-items: ; */
            /* justify-content: space-evenly; */
            gap: 18px;
        }
      .box {
        display: inline-block;
        width: 200px;
        height: 200px;
        background-color: red;
        /* flex-grow: 1; */
        flex-basis: 400px;
      }
      .box2{
        /* order:5; */
        /* flex-grow: 2; */
        flex-shrink: 10;
        min-width: 100px;
      }
      .box1{
        /* order: 3; */
        /* flex-grow: 3; */
        flex-shrink: 4;

      }
      .box3{
        /* order: 4; */
        flex-shrink: 5;
      }
      .span {
        background-color: blue;
        display: inline-block;
        width: 200px;
        height: 200px;
      }

      .page{
        margin-top: 200px;
        background-color: aqua;
        width: 500px;
        height: 500px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr;
        
        /*grid-template-areas: "header header header"
        "nav main ads"
        "footer footer footer"; */
      }
      .header{
        background-color: red;
        grid-column: 1 / 4;
        grid-row: 1 / 3;
        /* grid-area: header; */
      }
      .nav{
        background-color: blue;
        grid-column: 2 / 3;
        grid-row: 1 / 2;
        /* grid-area: nav; */
      }
      .ads{
        background-color: rgb(101, 232, 101);
        /* grid-area: ads; */
        grid-column:  1 / 5;
        grid-row: 3 / 5;
      }
      .content{
        background-color: pink;
        /* grid-area: main; */
        grid-column:  2 / 4;
        grid-row: 2 / 3;
      }
      .footer{
        background-color: purple;
        /* grid-area: footer; */
        grid-column: 2/3;
        grid-row: 3/5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box box1">BOX 1</div>
      <div class="box box2">BOX 2</div>
      <div class="box box3">BOX 3</div>
      <div class="box box1">BOX 1</div>
      <div class="box box2">BOX 2</div>
      <div class="box box3">BOX 3</div>
    </div>

    <div class="page">
        <header class="header">Header</header>
        <nav class="nav">Navigation</nav>
        <aside class="ads">Advertisement</aside>
        <main class="content">Main Content</main>
        <footer class="footer">Footer</footer>
    </div>

    <!-- <span class="span"> span </span> -->
  </body>
</html>
