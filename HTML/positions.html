<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aqua;
            width: 200px;            
            height: 200px;
        }
        .relative{
            position: relative;
            top: 100px;
            left: 300px;
            z-index: 2;
        }
        .parent{
            position: relative;
            background-color: rgb(73, 226, 43);
            width: 100%;
            height: 400px;
            border: 1px solid black;
        }
        .absolute{
            position: absolute;
            /* top: 200px; */
            right: 50PX;
        }
        .fixed{
            position: fixed;
            /* top: 300px; */
            /* left: 100px; */
            width: 100px;
            height: 100px;
            bottom: 10px;
            right: 10px;
            z-index: 10;
        }
        .sticky{
            position: sticky;
            /* width: 100%; */
            top: 100px;
            left: 200px;
        }
        .stickyparent{
            background-color: red;
            height: 1000px;
        }
    </style>
</head>
<body>
    <div class="box static">
        <h2>
            Static Position
        </h2>
    </div>
    <div class="stickyparent">
        <div class="box sticky">
        <h2>
            Sticky Position
        </h2>
    </div>
    </div>
    
    <div class="box relative">
        <h2>
            Relative Position
        </h2>
    </div>
    <div class="box fixed">
        <h2>
            Fixed Position
        </h2>
    </div>
    <div class="parent">
        <h1>Relative Parent for Absolute Child</h1>
        <div class="box absolute">
        <h2>
            Absolute Position
        </h2>
    </div>
    </div>
    <div class="parent">
        
    </div>
    <div class="parent">

    </div>
    <div class="parent">

    </div>
</body>
</html>
