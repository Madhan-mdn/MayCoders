<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="get">
    <h2>Login Form using HTML and CSS</h2>
    <h4>Sign in</h4>
    <p>Sign in with your username and password</p>
    <label for="name">Your username</label>
    <input type="text" id="name" name="name" placeholder="Enter Username">
    <br>
    <br>
    <label for="pass">Your Password</label>
    <input type="password" id="pass" name="pass" placeholder="Enter Password" minlength="8" maxlength="16">
    <br>
    <input type="submit" value="Login">
    <p>Not a member? <a href="#">Register here!</a></p>
    </form>
</body>
</html>
