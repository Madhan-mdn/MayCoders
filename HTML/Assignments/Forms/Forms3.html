<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h2>All Form Types Demo</h2>
        <label for="text">Text:</label>
        <input type="text" id="text" name="text" placeholder="Name">
        <br><br>

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="pass" placeholder="Secrecy">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="mail" placeholder="you@example.com">
        <br><br>

        <label for="url">URL:</label>
        <input type="text" id="url" name="url" placeholder="https://example.com">
        <br><br>

        <label for="tel">Telephone:</label>
        <input type="tel" id="tel" name="tel" placeholder="+91 1234567890" minlength="10">
        <br><br>

        <label for="search">Search:</label>
        <input type="search" id="search" name="search" placeholder="Search term">
        <br><br>

        <label for="num">Number:</label>
        <input type="number" id="num" name="num" step="5">
        <br><br>

        <label for="range">Range:</label>
        <input type="range" id="range" name="range" step="2">
        <br><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date">
        <label for="time">Time:</label>
        <input type="time" id="time" name="time">
        <label for="week">Week:</label>
        <input type="week" id="week" name="week">
        <label for="month">Month:</label>
        <input type="month" id="month" name="month">
        <br><br>

        <label for="file">File:</label>
        <input type="file" id="file" name="file">
        <br><br>

        <label for="color">Color:</label>
        <input type="color" id="color" name="color">
        <br><br>

        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I agree to the terms</label>
        <br>
        <input type="checkbox" id="subs" name="subs">
        <label for="subs">Subscribe to newsletter</label>
        <br><br>

        <label for="gender">Gender:</label>
        <br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>    
        <br><br>

        <label for="country">Country(single country):</label>
        <select id="country" name="country">
            <option value="notselected">--Choose--</option>
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
        </select>
        <br><br>

        <label for="msg">Message:</label>
        <textarea id="msg" name="msg" rows="4" cols="50" placeholder="Write something..."></textarea>
        <br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body> 
</html>
