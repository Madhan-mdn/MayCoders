<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        table,th,td{
            border: 2px solid black;
            padding: 10px;
        }

        table{
            width: 30%;
            border-collapse: collapse;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td style="background-color: rgb(249, 212, 218);">Logo</td>
            <td colspan="3" style="background-color: rgb(246, 246, 185);">
                Top Menu
            </td>
        </tr>
        <tr>
            <td rowspan="2" style="background-color: rgb(246, 246, 185);">Side Menu </td>
            <td style="background-color: rgb(202, 255, 255);">World News</td>
            <td style="background-color: rgb(202, 255, 255);">Financial</td>
            <td rowspan="2" style="background-color: rgb(249, 212, 218);">List of Ads</td>
        </tr>
        <tr>
            <td style="background-color: rgb(202, 255, 255);">Technology</td>
            <td style="background-color: rgb(202, 255, 255);">Sports</td>
        </tr>
        <tr>
        <td colspan="4" style="background-color: rgb(203, 199, 199);">Footer</td>
    </tr>

    </table>
</body>
</html>
