<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,td{
            border: 1px solid black;
            
        }
        td{
            text-align: center;
            padding: 10px 5px;
        }
        table{
            width: 20%;
        }
    </style>
</head>
<body>
    <table>
        <tr bgcolor="yellow">
            <td>1</td>
            <td colspan="2">2</td>
            <td colspan="2">3</td>
        </tr>
        <tr bgcolor="lightblue">
            <td rowspan="2" colspan="2">4</td>
            <td colspan="3">5</td>
        </tr>
        <tr bgcolor="green">
            <td colspan="2">6</td>
            <td rowspan="3">7</td>
        </tr>
        <tr bgcolor="beige">
            <td rowspan="5">8</td>
            <td>9</td>
            <td>10</td>
            <td rowspan="2">11</td>
            
        </tr>
        <tr bgcolor="red">
            <td colspan="2">12</td>
        </tr>
        <tr bgcolor="pink">
            <td rowspan="3">13</td>
            <td colspan="3">14</td>
        </tr>
        <tr bgcolor="red">
            <td colspan="2">15</td>
            <td>16</td>
        </tr>
        <tr bgcolor="orange">
            <td colspan="3">17</td>
        </tr>
    </table>
</body>
</html>
