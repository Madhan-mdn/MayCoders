<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        width: 100%;
        height: 100vh;
      }

      .container {
        width: 100vw;
        height: 100vh;
        display: flex;
      }

      .left {
        width: 40%;
        background: linear-gradient(135deg, #c084fc, #7c3aed);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        padding: 20px;
      }

      .content h1 {
        margin-bottom: 20px;
        font-size: 40px;
      }

      .content p {
        margin: 10px 0;
      }

      .content a {
        color: white;
        font-weight: bold;
      }

      .right {
        width: 60%;
        background: #f5f5f5;
        padding: 60px;
      }

      .right h2 {
        margin-bottom: 30px;
      }

      .row {
        display: flex;
        gap: 15px;
        margin-bottom: 15px;
      }

      .row input {
        flex: 1;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      textarea {
        height: 120px;
        resize: none;
        margin-bottom: 15px;
      }

      .btns {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px 25px;
        border: none;
        border-radius: 20px;
        cursor: pointer;
      }

      button[type="reset"] {
        background: #ddd;
      }

      button[type="submit"] {
        background: #7c3aed;
        color: white;
      }
    </style>
  </head>
  <body>
    <button><a href="./animations.html">Animations</a></button>
    <div class="container">
      <div class="left">
        <div class="content">
          <h1>RJ Technology</h1>
          <p>M.VERVE</p>
          <p>Inspire Applications</p>
          <p>To connect with us please enter the details</p>
          <a href="#">Here</a>
        </div>
      </div>

      <div class="right">
        <h2>Create an account</h2>

        <form>
          <div class="row">
            <input type="text" placeholder="First Name" />
            <input type="text" placeholder="Last Name" />
            <input type="number" placeholder="Age" />
          </div>

          <div class="row">
            <input type="tel" placeholder="Mobile Number" />
            <input type="email" placeholder="Email" />
          </div>

          <textarea placeholder="Description"></textarea>

          <div class="row">
            <input type="password" placeholder="Password" />
            <input type="password" placeholder="Confirm Password" />
          </div>

          <div class="btns">
            <button type="reset">Reset</button>
            <button type="submit">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
