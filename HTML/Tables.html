<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,th,td{
            border: 2px solid rgb(117, 117, 117);
        }
        table{
            width: 100%;
            border-collapse: collapse;
            
        }
        th{
            text-align: left;
        }
        caption{
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <table>
    <caption>Student Report Card</caption>
    <thead>
        <tr>
            <th colspan="2" rowspan="3">Student Details</th>
            <th>Name</th>
            <th>Madhan</th>

        </tr>
        <tr>
            <td>Roll Number</td>
            <td>101</td>
        </tr>
        <tr>
            <td>Class</td>
            <td>Final</td>
        </tr>
        <tr>
            <th>Subject</th>
            <th>Theory</th>
            <th>Practical</th>
            <th>Total</th>
        </tr>
    </thead>
    <tbody>
        
        <tr>
            <td>HTML</td>
            <td>90</td>
            <td>10</td>
            <td>100</td> 
        </tr>
        <tr>
            <td>CSS</td>
            <td>80</td>
            <td>20</td>
            <td>100</td>    
        </tr>
        <tr>
            <td>JavaScript</td>
            <td>85</td>
            <td>15</td>
            <td>100</td>
        </tr>
        <tr>
            <th  colspan="2">Attendance</th>
            <th  colspan="2">92%</th>
        </tr>
        <tr>
            <th  colspan="2">Result</th>
            <th  colspan="2">Pass</th>
        </tr>
        <tr>
            <th colspan="4">Summary</th>
        </tr>
        </tbody>

        <tfoot>
        <tr>
            <td  colspan="2">Total Marks</td>
            <td  colspan="2">275</td>
        </tr>
        <tr>
            <td  colspan="2">Grade</td>
            <td  colspan="2">A</td>
        </tr>
        </tfoot>
    </table>
</body>
</html>
